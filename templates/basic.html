{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-gray-900">
    <header class="text-gray-400 bg-gray-900 body-font">
  <div class="container mx-auto flex flex-wrap p-5 flex-col md:flex-row items-center">
    <a class="flex title-font font-medium items-center text-white mb-4 md:mb-0">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" class="w-10 h-10 text-white p-2 bg-indigo-500 rounded-full" viewBox="0 0 24 24">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
      </svg>
      <span class="ml-3 text-xl">My Store</span>
    </a>
    <nav class="md:ml-auto flex flex-wrap items-center text-base justify-center">
      <button><a href="/" class="mr-5 hover:text-white">Home page</a></button>
      {% if user.is_authenticated %}
      <button><a href="#" class="mr-5 hover:text-white">{{ user.username }}</a></button>
      <button><a href="{% url 'logout' %}" class="mr-5 hover:text-white">Logout</a></button>
      {% else %}
      <button><a href="{% url 'Registration' %}" class="mr-5 hover:text-white">Registration</a></button>
      <button><a href="{% url 'login' %}" class="mr-5 hover:text-white">Login</a></button>
      {% endif %}
    </nav>
  </div>
</header>

    {% block content %}
    {% endblock %}

<footer class="text-gray-400 bg-gray-900 body-font border-t border-gray-800">
  <div class="container px-5 py-8 mx-auto flex items-center sm:flex-row flex-col">
    <a class="flex title-font font-medium items-center md:justify-start justify-center text-white">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" class="w-10 h-10 text-white p-2 bg-indigo-500 rounded-full" viewBox="0 0 24 24">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
      </svg>
      <span class="ml-3 text-xl">My Store</span>
    </a>
    <p class="text-sm text-gray-400 sm:ml-4 sm:pl-4 sm:border-l-2 sm:border-gray-800 sm:py-2 sm:mt-0 mt-4">Clothes © 2025 My Store</p>
  </div>
</footer>
</body>
</html>
